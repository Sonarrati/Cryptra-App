<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cryptra - Multi-Level Referral System</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-body">
    <div class="container">
        <div class="auth-container">
            <div class="auth-header">
                <h1>Cryptra</h1>
                <p>Earn with Multi-Level Referral System</p>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">Login</button>
                <button class="tab-btn" data-tab="signup">Sign Up</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form active">
                <div class="form-group">
                    <input type="email" id="loginEmail" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <input type="password" id="loginPassword" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Login</button>
            </form>

            <!-- Sign Up Form -->
            <form id="signupForm" class="auth-form">
                <div class="form-group">
                    <input type="text" id="signupName" placeholder="Full Name" required>
                </div>
                <div class="form-group">
                    <input type="email" id="signupEmail" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <input type="password" id="signupPassword" placeholder="Password" minlength="6" required>
                </div>
                <div class="form-group">
                    <input type="text" id="referralCode" placeholder="Referral Code (Optional)">
                </div>
                <button type="submit" class="btn btn-primary btn-full">Create Account</button>
            </form>

            <div class="auth-features">
                <div class="feature">
                    <i class="fas fa-users"></i>
                    <span>7-Level Referral System</span>
                </div>
                <div class="feature">
                    <i class="fas fa-gem"></i>
                    <span>Daily Rewards</span>
                </div>
                <div class="feature">
                    <i class="fas fa-wallet"></i>
                    <span>Instant Withdrawals</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="assets/supabaseClient.js"></script>
    <script type="module" src="assets/auth.js"></script>
</body>
</html>
