<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Cryptra</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="app-header">
            <div class="app-title">Cryptra</div>
            <div class="notification-icon">
                <div class="notification-bell">
                    <i class="fas fa-bell"></i>
                </div>
                <div class="notification-badge">3</div>
            </div>
        </div>

        <div class="content">
            <!-- Leaderboard Tabs -->
            <div class="card">
                <div class="leaderboard-tabs">
                    <button class="tab-btn active" data-period="daily">Daily</button>
                    <button class="tab-btn" data-period="weekly">Weekly</button>
                    <button class="tab-btn" data-period="alltime">All Time</button>
                </div>
            </div>

            <!-- Leaderboard List -->
            <div class="card">
                <div class="leaderboard-list" id="leaderboardList">
                    <!-- Leaderboard will be loaded here -->
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <a href="dashboard.html" class="nav-item">
                <div class="nav-icon"><i class="fas fa-home"></i></div>
                <span>Home</span>
            </a>
            <a href="referral.html" class="nav-item">
                <div class="nav-icon"><i class="fas fa-users"></i></div>
                <span>Referral</span>
            </a>
            <a href="luckydraw.html" class="nav-item">
                <div class="nav-icon"><i class="fas fa-gift"></i></div>
                <span>Lucky Draw</span>
            </a>
            <a href="leaderboard.html" class="nav-item active">
                <div class="nav-icon"><i class="fas fa-trophy"></i></div>
                <span>Leaderboard</span>
            </a>
            <a href="profile.html" class="nav-item">
                <div class="nav-icon"><i class="fas fa-user"></i></div>
                <span>Profile</span>
            </a>
        </div>
    </div>

    <script type="module" src="assets/supabaseClient.js"></script>
    <script type="module" src="assets/leaderboard.js"></script>
</body>
</html>
