<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scratch & Earn - Cryptra</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="app-header">
            <div class="app-title">Cryptra</div>
            <div class="notification-icon">
                <div class="notification-bell">
                    <i class="fas fa-bell"></i>
                </div>
                <div class="notification-badge">3</div>
            </div>
        </div>

        <div class="content">
            <!-- Scratch Stats -->
            <div class="card">
                <div class="card-title">Scratch & Earn</div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="todayScratches">0/3</div>
                        <div class="stat-label">Today's Scratches</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="todayEarnings">$0.00</div>
                        <div class="stat-label">Today's Earnings</div>
                    </div>
                </div>
            </div>

            <!-- Scratch Card -->
            <div class="card">
                <div class="scratch-container">
                    <canvas id="scratchCanvas" width="300" height="200"></canvas>
                    <div class="scratch-prize" id="scratchPrize" style="display: none;">
                        <i class="fas fa-gift"></i>
                        <div class="prize-amount" id="prizeAmount">$0.00</div>
                    </div>
                </div>
                <button class="btn btn-primary btn-full" id="scratchBtn">
                    Scratch Card
                </button>
            </div>

            <!-- Recent Scratch Earnings -->
            <div class="card">
                <div class="card-title">Recent Scratch Earnings</div>
                <div class="activity-list" id="scratchEarnings">
                    <!-- Earnings will be loaded here -->
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <a href="dashboard.html" class="nav-item">
                <div class="nav-icon"><i class="fas fa-home"></i></div>
                <span>Home</span>
            </a>
            <a href="referral.html" class="nav-item">
                <div class="nav-icon"><i class="fas fa-users"></i></div>
                <span>Referral</span>
            </a>
            <a href="luckydraw.html" class="nav-item">
                <div class="nav-icon"><i class="fas fa-gift"></i></div>
                <span>Lucky Draw</span>
            </a>
            <a href="leaderboard.html" class="nav-item">
                <div class="nav-icon"><i class="fas fa-trophy"></i></div>
                <span>Leaderboard</span>
            </a>
            <a href="profile.html" class="nav-item">
                <div class="nav-icon"><i class="fas fa-user"></i></div>
                <span>Profile</span>
            </a>
        </div>
    </div>

    <script type="module" src="assets/supabaseClient.js"></script>
    <script type="module" src="assets/scratch.js"></script>
</body>
</html>
